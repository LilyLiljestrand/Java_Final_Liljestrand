<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head}"></head>
<body id="pageCenter">
    <div th:replace="~{fragments :: header}"></div>
    <main>
        <h2>Register as New User</h2>
        <form method="POST" th:action="@{/user/register}" id="registrationForm">
            <label for="username">Enter Username:</label>
            <input type="text" id="username" name="username"/><br>
            <!---->
            <label for="password">Enter Password:</label>
            <input type="password" id="password" name="password"/><br>
            <!---->
            <label for="confirm">Confirm Password:</label>
            <input type="password" id="confirm" name="confirm"/><br>
            <!---->
            <label for="fullname">Enter Full Name:</label>
            <input type="text" id="fullname" name="fullname"/><br>
            <!---->
            <label for="contact">Enter Contact:</label>
            <input type="text" id="contact" name="contact"/><br>
            <!---->
            <label for="email">Enter Email:</label>
            <input type="email" id="email" name="email"/><br>
            <!---->
            Select Campus: <select th:field="{campus}">
                <option th:each="t : ${RideType}"
                        th:value="${t}"
                        th:text="${t}">
                Campus</option>
            </select>
            <!---->
            <label for="city">Enter City:</label>
            <input type="text" id="city" name="city"/><br>
            <!---->
            <label for="state">Enter State:</label>
            <input type="text" id="state" name="state"/><br>
            <!---->
            <input type="submit" value="Register"/>
        </form>
    </main>
    <footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
